<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Chat — TriState Aquatic Solutions</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.chat-container { width: 400px; max-width: 95vw; background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); overflow: hidden; }
.chat-header { background: #1B365D; color: white; padding: 20px; text-align: center; }
.chat-header h2 { font-size: 18px; margin-bottom: 4px; }
.chat-header p { font-size: 13px; opacity: 0.8; }
.chat-messages { height: 400px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.message { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
.message.bot { background: #e8f4f8; color: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; }
.message.user { background: #1B365D; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
.message.system { background: #f0f0f0; color: #666; align-self: center; font-size: 12px; text-align: center; }
.chat-input { display: flex; border-top: 1px solid #eee; padding: 12px; gap: 8px; }
.chat-input input { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; }
.chat-input input:focus { border-color: #1B365D; }
.chat-input button { background: #1B365D; color: white; border: none; border-radius: 8px; padding: 10px 18px; font-size: 14px; cursor: pointer; }
.chat-input button:hover { background: #2a4a7a; }
.typing { display: none; padding: 8px 14px; }
.typing.active { display: block; }
.typing span { display: inline-block; width: 8px; height: 8px; background: #ccc; border-radius: 50%; animation: bounce 1.4s infinite; margin: 0 2px; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }
</style>
    <link rel="stylesheet" href="/css/chat-widget.css">
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h2>Tri-State Aquatic Solutions</h2>
        <p>Chat with us about pool services</p>
    </div>
    <div class="chat-messages" id="messages">
        <div class="message bot">Hey! How can we help you today? Reply STOP to opt out.</div>
    </div>
    <div class="typing" id="typing">
        <span></span><span></span><span></span>
    </div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
// This is a TEST page - it simulates sending messages to the GHL bot
// In production, this would connect to GHL's Live Chat or Conversations API

const messages = document.getElementById('messages');
const typing = document.getElementById('typing');
const input = document.getElementById('userInput');

function addMessage(text, type) {
    const div = document.createElement('div');
    div.className = 'message ' + type;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    
    addMessage(text, 'user');
    input.value = '';
    
    // Show typing indicator
    typing.classList.add('active');
    
    // For testing: this simulates the bot response
    // In production, this would call the GHL Conversations API
    addMessage('This is a test interface. To test the actual bot, use the GHL Test Your Bot panel or send an SMS to 610-772-8827.', 'system');
    typing.classList.remove('active');
}

input.focus();
</script>
<script src="/js/chat-widget.js" defer></script>
</body>
</html>
